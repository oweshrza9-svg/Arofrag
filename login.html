<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | AROFRAG</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header id="navbar"></header>

<main>

<section class="login-section">

<div class="container">

<div class="login-wrapper">

<div class="login-banner">

<img src="assets/arologopng.png" alt="AROFRAG" class="def-logo-size">

<div class="banner-content">

<h1>Welcome Back</h1>

<p>Discover timeless fragrances crafted with elegance.</p>

</div>

</div>

<div class="login-card">

<div class="login-header">

<h2>Sign In</h2>

<p>Enter your credentials to continue.</p>

</div>

<form id="loginForm" novalidate>

<div class="form-group">

<label for="loginEmail">Email Address</label>

<input type="email" id="loginEmail" name="email" placeholder="Enter your email" autocomplete="email" required>

<small class="error-message" id="emailError"></small>

</div>

<div class="form-group">

<label for="loginPassword">Password</label>

<div class="password-box">

<input type="password" id="loginPassword" name="password" placeholder="Enter your password" autocomplete="current-password" required>

<button type="button" id="togglePassword" class="password-toggle">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<small class="error-message" id="passwordError"></small>

</div>

<div class="login-options">

<label class="remember-me">

<input type="checkbox" id="rememberMe">

<span>Remember Me</span>

</label>

<a href="forgot-password.html">Forgot Password?</a>

</div>

<button type="submit" class="login-btn">

Login

</button>

<div class="login-divider">

<span>OR</span>

</div>

<button type="button" class="google-login-btn">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<p class="register-link">

Don't have an account?

<a href="register.html">Create Account</a>

</p>

</form>

</div>

</div>

</div>

</section>

</main>

<footer id="footer"></footer>

<script src="js/util.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>

</body>
</html>
