<main>

<section class="auth-section">

<div class="container">

<div class="auth-wrapper">

<div class="auth-banner">

<img src="assets/register-banner.jpg" alt="Register">

<div class="banner-content">

<h1>Join AROFRAG</h1>

<p>Create your account and discover premium fragrances.</p>

</div>

</div>

<div class="auth-card">

<div class="auth-header">

<h2>Create Account</h2>

<p>Fill in your details below.</p>

</div>

<form id="registerForm">

<div class="form-group">

<label for="fullName">Full Name</label>

<input type="text" id="fullName" required>

<small id="nameError" class="error-message"></small>

</div>

<div class="form-group">

<label for="registerEmail">Email</label>

<input type="email" id="registerEmail" required>

<small id="registerEmailError" class="error-message"></small>

</div>

<div class="form-group">

<label for="registerPhone">Phone</label>

<input type="tel" id="registerPhone" required>

<small id="phoneError" class="error-message"></small>

</div>

<div class="form-group">

<label for="registerPassword">Password</label>

<div class="password-box">

<input type="password" id="registerPassword" required>

<button type="button" id="toggleRegisterPassword" class="password-toggle">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<small id="registerPasswordError" class="error-message"></small>

</div>

<div class="form-group">

<label for="confirmPassword">Confirm Password</label>

<input type="password" id="confirmPassword" required>

<small id="confirmPasswordError" class="error-message"></small>

</div>

<label class="remember-me">

<input type="checkbox" id="acceptTerms">

<span>I agree to the Terms & Conditions</span>

</label>

<button type="submit" class="login-btn">

Create Account

</button>

<p class="register-link">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

</div>

</section>

</main>
<script src="js/util.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
